<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: #f7faf8;
      color: #16231d;
    }
    .drop {
      box-sizing: border-box;
      height: 100vh;
      min-height: 150px;
      border: 2px dashed #80a994;
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff 0%, #edf6f1 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px;
      text-align: center;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }
    .drop.active {
      border-color: #247c5a;
      background: #e2f2ea;
      transform: scale(0.992);
    }
    .icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #dceee6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #247c5a;
      font-size: 26px;
      font-weight: 700;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .hint {
      max-width: 460px;
      color: #52635b;
      font-size: 13px;
      line-height: 1.35;
    }
    .file {
      color: #247c5a;
      font-size: 12px;
      min-height: 18px;
      word-break: break-all;
    }
    img {
      display: none;
      max-width: 96%;
      max-height: 72px;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid #d7e5dd;
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="drop" class="drop">
    <div class="icon">+</div>
    <div class="title">Drop a circuit image here</div>
    <div class="hint">PNG, JPEG, GIF, or WebP. CiTT will save the image locally, then the selected CLI will parse it into a model spec.</div>
    <img id="preview" alt="">
    <div id="file" class="file"></div>
  </div>

  <script>
    function setup(htmlComponent) {
      const drop = document.getElementById("drop");
      const fileLabel = document.getElementById("file");
      const preview = document.getElementById("preview");

      function stop(event) {
        event.preventDefault();
        event.stopPropagation();
      }

      ["dragenter", "dragover"].forEach((name) => {
        drop.addEventListener(name, (event) => {
          stop(event);
          drop.classList.add("active");
        });
      });

      ["dragleave", "drop"].forEach((name) => {
        drop.addEventListener(name, (event) => {
          stop(event);
          drop.classList.remove("active");
        });
      });

      drop.addEventListener("drop", (event) => {
        const file = event.dataTransfer.files && event.dataTransfer.files[0];
        if (!file) {
          htmlComponent.Data = { kind: "drop-error", message: "No file was dropped." };
          return;
        }
        if (!file.type || !file.type.startsWith("image/")) {
          htmlComponent.Data = { kind: "drop-error", message: "Please drop an image file." };
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          const dataUrl = String(reader.result);
          preview.src = dataUrl;
          preview.style.display = "block";
          fileLabel.textContent = file.name;
          htmlComponent.Data = {
            kind: "image-drop",
            name: file.name,
            mimeType: file.type,
            dataUrl: dataUrl
          };
        };
        reader.onerror = () => {
          htmlComponent.Data = { kind: "drop-error", message: "Could not read the dropped file." };
        };
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>
